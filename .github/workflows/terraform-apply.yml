# Terraform Apply — applies approved infrastructure changes
#
# Triggers: Push to main affecting terraform/**
# Auth: GitHub OIDC → AWS IAM role
# Safety: Requires manual approval for production

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

