name: Deploy Service
# Supports workflow_dispatch (manual) and repository_dispatch (cross-repo, type: deploy-service)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to deploy'
        required: true
        type: choice
        options:
          - core
          - shuttleforge
          - podbay
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
      image_tag:
        description: 'ECR image tag to deploy (e.g., v1-abc1234)'
        required: true
        type: string
  repository_dispatch:
    types: [deploy-service]

concurrency:
  group: deploy-${{ github.event.inputs.module || github.event.client_payload.module }}-${{ github.event.inputs.environment || github.event.client_payload.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '650880817826'
  DEPLOY_MODULE: ${{ github.event.inputs.module || github.event.client_payload.module }}
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment }}
  DEPLOY_IMAGE_TAG: ${{ github.event.inputs.image_tag || github.event.client_payload.image_tag }}

jobs:
  verify-image:
    name: Verify image exists in ECR
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::650880817826:role/arclight-overcast-terraform-${{ env.DEPLOY_ENVIRONMENT }}
          aws-region: us-east-1

      - name: Check ECR image
        run: |
          aws ecr describe-images \
            --repository-name arclight/${{ env.DEPLOY_MODULE }} \
            --image-ids imageTag=${{ env.DEPLOY_IMAGE_TAG }} \
            --query 'imageDetails[0].imageSizeInBytes' \
            --output text
          echo "Image arclight/${{ env.DEPLOY_MODULE }}:${{ env.DEPLOY_IMAGE_TAG }} verified."

  deploy:
    name: Deploy ${{ env.DEPLOY_MODULE }} to ${{ env.DEPLOY_ENVIRONMENT }}
    needs: verify-image
    runs-on: ubuntu-latest
    environment: ${{ env.DEPLOY_ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::650880817826:role/arclight-overcast-terraform-${{ env.DEPLOY_ENVIRONMENT }}
          aws-region: us-east-1

      - name: Get current task definition
        id: current-task-def
        run: |
          FAMILY="arclight-${{ env.DEPLOY_MODULE }}-${{ env.DEPLOY_ENVIRONMENT }}"
          TASK_DEF=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query 'taskDefinition' --output json)
          echo "$TASK_DEF" > current-task-def.json
          echo "family=$FAMILY" >> $GITHUB_OUTPUT

      - name: Update image in task definition
        id: new-task-def
        run: |
          NEW_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/arclight/${{ env.DEPLOY_MODULE }}:${{ env.DEPLOY_IMAGE_TAG }}"

          # Replace the image in the container definition
          jq --arg img "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $img' \
            current-task-def.json > updated-task-def.json

          # Extract fields needed for register-task-definition
          CONTAINER_DEFS=$(jq -c '.containerDefinitions' updated-task-def.json)
          CPU=$(jq -r '.cpu' updated-task-def.json)
          MEMORY=$(jq -r '.memory' updated-task-def.json)
          EXEC_ROLE=$(jq -r '.executionRoleArn' updated-task-def.json)
          TASK_ROLE=$(jq -r '.taskRoleArn // empty' updated-task-def.json)
          NET_MODE=$(jq -r '.networkMode' updated-task-def.json)

          REGISTER_ARGS=(
            --family "${{ steps.current-task-def.outputs.family }}"
            --container-definitions "$CONTAINER_DEFS"
            --cpu "$CPU"
            --memory "$MEMORY"
            --execution-role-arn "$EXEC_ROLE"
            --network-mode "$NET_MODE"
            --requires-compatibilities FARGATE
          )

          if [ -n "$TASK_ROLE" ]; then
            REGISTER_ARGS+=(--task-role-arn "$TASK_ROLE")
          fi

          NEW_ARN=$(aws ecs register-task-definition "${REGISTER_ARGS[@]}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "new_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered task definition: $NEW_ARN"

      - name: Update ECS service
        run: |
          SERVICE_NAME="arclight-${{ env.DEPLOY_MODULE }}-${{ env.DEPLOY_ENVIRONMENT }}"
          CLUSTER="arclight-${{ env.DEPLOY_ENVIRONMENT }}"

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE_NAME" \
            --task-definition "${{ steps.new-task-def.outputs.new_arn }}" \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

          echo "Service $SERVICE_NAME updated. Waiting for stability..."

      - name: Wait for service stable
        run: |
          SERVICE_NAME="arclight-${{ env.DEPLOY_MODULE }}-${{ env.DEPLOY_ENVIRONMENT }}"
          CLUSTER="arclight-${{ env.DEPLOY_ENVIRONMENT }}"

          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE_NAME"

          echo "Service is stable."

      - name: Verify health
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          DOMAIN="${{ env.DEPLOY_ENVIRONMENT }}.arclight-complex.net"
          URL="https://${{ env.DEPLOY_MODULE }}.${DOMAIN}/ready"
          CF_HEADERS=""
          if [ -n "$CF_ACCESS_CLIENT_ID" ]; then
            CF_HEADERS="-H CF-Access-Client-Id:${CF_ACCESS_CLIENT_ID} -H CF-Access-Client-Secret:${CF_ACCESS_CLIENT_SECRET}"
          fi

          echo "Checking $URL..."

          # Retry up to 5 times with 10s intervals
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" $CF_HEADERS "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed: $URL returned 200"
              curl -sf $CF_HEADERS "$URL" | jq .
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 5 attempts"
          exit 1

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Module | ${{ env.DEPLOY_MODULE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ env.DEPLOY_ENVIRONMENT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ env.DEPLOY_IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Definition | ${{ steps.new-task-def.outputs.new_arn }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
