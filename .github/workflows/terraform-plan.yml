# Terraform Plan — runs on PRs to show what would change
#
# Triggers: PR to main affecting terraform/**
# Auth: GitHub OIDC → AWS IAM role (no long-lived keys)
# Output: Plan summary as PR comment

name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'

