# Build and Push Image — builds module Docker images and pushes to ECR
#
# Triggers: Called by module repos via workflow_dispatch or repository_dispatch
# Auth: GitHub OIDC → AWS IAM role with ECR push permissions
#
# D-056 §11: Module repos own Dockerfiles. This workflow consumes them.

name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module name (core, shuttleforge, podbay)'
        required: true
        type: choice
        options:
          - core
          - shuttleforge
          - podbay
          - podbay-workspace-browser
      ref:
        description: 'Git ref to build from (tag or SHA)'
        required: true
        type: string

