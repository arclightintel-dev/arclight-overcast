# Build and Push Image — FALLBACK workflow
#
# Per D-059: Module repos own their build/test workflows and push images
# to ECR directly. This workflow exists as a fallback for manual builds
# from Overcast (e.g., dbbootstrap image, emergency rebuilds).
#
# Normal flow: module repo CI → build → push to ECR → developer triggers
# deploy-service.yml in Overcast with the image tag.

name: Build and Push Image (fallback)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module name'
        required: true
        type: choice
        options:
          - dbbootstrap
      dockerfile_path:
        description: 'Dockerfile path relative to repo root'
        required: true
        type: string
        default: 'services/dbbootstrap/Dockerfile'
      context_path:
        description: 'Docker build context path'
        required: true
        type: string
        default: 'services/dbbootstrap'
      image_tag:
        description: 'Image tag (e.g., v1, v2)'
        required: true
        type: string
        default: 'v1'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '650880817826'

jobs:
  build-push:
    name: Build and push arclight/${{ inputs.module }}:${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::650880817826:role/arclight-overcast-terraform-staging
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/arclight/${{ inputs.module }}:${{ inputs.image_tag }}"
          docker build -f ${{ inputs.dockerfile_path }} -t "$IMAGE" ${{ inputs.context_path }}
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: Post summary
        run: |
          echo "## Image Build" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | arclight/${{ inputs.module }}:${{ inputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
